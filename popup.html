<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Abstract Bauhaus Tracker</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 12px;
      font-family: sans-serif;
      background: #f5f2e8;
      color: #111;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #siteLabel,
    #sessionLabel,
    #totalLabel {
      margin: 4px 0;
      font-size: 13px;
    }

    #siteLabel {
      font-weight: bold;
      word-break: break-word;
    }

    #canvas-holder {
      width: 200px;
      height: 200px;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ccc;
      background: #f5f2e8;
    }

    canvas {
      display: block;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: #ff8fab;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    #debugOutput {
      max-height: 140px;
      overflow: auto;
      font-size: 10px;
      white-space: pre-wrap;
      background: #eee;
      padding: 8px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>Abstract Bauhaus Tracker</h2>

  <div id="siteLabel">Site: Loading...</div>
  <div id="sessionLabel">Session: 00:00:00</div>
  <div id="totalLabel">Total: 00:00:00</div>

  <div id="canvas-holder"></div>

  <button id="reset">Reset this site</button>
  <button id="debug">Debug storage</button>
  <button id="clean">Clean old keys</button>

  <pre id="debugOutput"></pre>

  <script src="p5.min.js"></script>
  <script src="popup.js"></script>
  <script src="popup-sketch.js"></script>
</body>
</html>
